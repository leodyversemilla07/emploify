services:
  - type: web
    name: emploify-web
    env: node
    buildCommand: cd apps/web && bun install && bun run build
    startCommand: cd apps/web && bun run start
    branch: main
    plan: free

  - type: web
    name: emploify-api
    env: node
    buildCommand: cd apps/api && bun install && bun run prisma:generate && bunx prisma migrate deploy && bun run build
    startCommand: cd apps/api && node dist/main.js
    branch: main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false