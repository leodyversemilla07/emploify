services:
  - type: web
    name: emploify-web
    env: node
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm run start
    branch: main
    plan: free
    
  - type: web
    name: emploify-api
    env: node
    buildCommand: cd apps/api && npm install && npm run build && npx prisma generate
    startCommand: cd apps/api && npm run start
    branch: main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false